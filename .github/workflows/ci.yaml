name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write    # needed to push tags on main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read Cargo.toml version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: Build WASM binary
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Print binary size
        run: ls -lh target/wasm32-unknown-unknown/release/adaptive_concurrency_wasm.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: adaptive_concurrency_wasm
          path: target/wasm32-unknown-unknown/release/adaptive_concurrency_wasm.wasm
          retention-days: 7

      # ------------------------------------------------------------------
      # Auto-tag on push to main (skipped for PRs)
      # Reads version from Cargo.toml and creates a tag if it doesn't exist.
      # The tag push triggers the Release workflow.
      # ------------------------------------------------------------------
      - name: Tag release from Cargo.toml version
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "Detected version: ${VERSION}"

          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists — skipping."
          else
            echo "Creating and pushing tag ${VERSION}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${VERSION}" -m "Release ${VERSION}"
            git push origin "${VERSION}"
          fi
