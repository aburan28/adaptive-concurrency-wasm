name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --target wasm32-unknown-unknown -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: Build WASM binary
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Print binary size
        run: ls -lh target/wasm32-unknown-unknown/release/adaptive_concurrency_wasm.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: adaptive_concurrency_wasm
          path: target/wasm32-unknown-unknown/release/adaptive_concurrency_wasm.wasm
          retention-days: 7
