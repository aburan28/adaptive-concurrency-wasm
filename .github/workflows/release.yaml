name: Release

on:
  # Triggered by tag push from CI workflow, or manual tag push
  push:
    tags:
      - "v*"
  # Also triggered when CI completes on main — handles the case where
  # GITHUB_TOKEN tag pushes don't trigger `push/tags` events.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write          # create GitHub releases + upload assets
  packages: write          # push OCI images to ghcr.io

env:
  WASM_FILE: target/wasm32-unknown-unknown/release/adaptive_concurrency_wasm.wasm
  OCI_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run if: (a) triggered by tag push, or (b) CI succeeded on main
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Determine the version tag to release
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Triggered by tag push — use the tag directly
            TAG="${{ github.ref_name }}"
          else
            # Triggered by workflow_run — read version from Cargo.toml
            TAG="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing: ${TAG}"

          # Check if this tag actually exists
          if ! git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} does not exist — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Check if a release already exists for this tag
      - name: Check existing release
        if: steps.version.outputs.skip != 'true'
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build WASM binary (release)
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Compute SHA-256
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        id: sha
        run: |
          SHA=$(sha256sum ${{ env.WASM_FILE }} | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "### WASM Binary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Size:** $(ls -lh ${{ env.WASM_FILE }} | awk '{print $5}')" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA-256:** \`${SHA}\`" >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # GitHub Release — .wasm binary as a downloadable asset
      # ---------------------------------------------------------------
      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ env.WASM_FILE }}
          body: |
            ## WASM Binary

            **SHA-256:** `${{ steps.sha.outputs.sha256 }}`

            ### Usage with Envoy Gateway (HTTP URL)

            ```yaml
            apiVersion: gateway.envoyproxy.io/v1alpha1
            kind: EnvoyExtensionPolicy
            metadata:
              name: adaptive-concurrency
            spec:
              targetRefs:
                - group: gateway.networking.k8s.io
                  kind: HTTPRoute
                  name: my-app
              wasm:
                - name: adaptive-concurrency
                  rootID: adaptive_concurrency
                  code:
                    type: HTTP
                    http:
                      url: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/adaptive_concurrency_wasm.wasm
                      sha256: "${{ steps.sha.outputs.sha256 }}"
            ```

            ### Usage with Envoy Gateway (OCI Image)

            ```yaml
            apiVersion: gateway.envoyproxy.io/v1alpha1
            kind: EnvoyExtensionPolicy
            metadata:
              name: adaptive-concurrency
            spec:
              targetRefs:
                - group: gateway.networking.k8s.io
                  kind: HTTPRoute
                  name: my-app
              wasm:
                - name: adaptive-concurrency
                  rootID: adaptive_concurrency
                  code:
                    type: Image
                    image:
                      url: ${{ env.OCI_IMAGE }}:${{ steps.version.outputs.tag }}
            ```

      # ---------------------------------------------------------------
      # OCI Image — push WASM binary to ghcr.io as an OCI artifact
      # ---------------------------------------------------------------
      - name: Install oras
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        uses: oras-project/setup-oras@v1

      - name: Log in to ghcr.io
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push WASM as OCI artifact
        if: steps.version.outputs.skip != 'true' && steps.check.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Push with the WASM media type that Envoy expects
          oras push "${{ env.OCI_IMAGE }}:${TAG}" \
            --artifact-type application/vnd.module.wasm.content.layer.v1+wasm \
            "${{ env.WASM_FILE }}:application/wasm"

          # Also tag as latest
          oras tag "${{ env.OCI_IMAGE }}:${TAG}" latest

          echo "### OCI Image" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`${{ env.OCI_IMAGE }}:${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Also tagged:** \`${{ env.OCI_IMAGE }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
