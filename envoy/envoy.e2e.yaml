admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: main
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: upstream_cluster
                            timeout: 30s
                            retry_policy:
                              retry_on: "5xx"
                              num_retries: 3
                              per_try_timeout: 10s
                              retry_host_predicate:
                                - name: envoy.retry_host_predicates.previous_hosts
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.retry.host.previous_hosts.v3.PreviousHostsPredicate
                              host_selection_retry_max_attempts: 5
                http_filters:
                  - name: envoy.filters.http.wasm
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.wasm.v3.Wasm
                      config:
                        name: "adaptive_concurrency"
                        root_id: "adaptive_concurrency"
                        configuration:
                          "@type": type.googleapis.com/google.protobuf.StringValue
                          value: |
                            {
                              "initial_concurrency_limit": 100,
                              "min_concurrency_limit": 3,
                              "max_concurrency_limit": 1000,
                              "sample_window_size": 25,
                              "min_rtt_recalc_windows": 5,
                              "min_rtt_buffer_pct": 0.25,
                              "sample_percentile": 0.9,
                              "max_gradient": 2.0,
                              "tick_period_ms": 500,
                              "host_expiry_secs": 300,
                              "overload_response_code": 503,
                              "overload_gradient_threshold": 0.7,
                              "recovery_gradient_threshold": 0.95,
                              "min_rtt_probe_count": 10,
                              "dry_run": false
                            }
                        vm_config:
                          runtime: "envoy.wasm.runtime.v8"
                          code:
                            local:
                              filename: "/etc/envoy/adaptive_concurrency_wasm.wasm"
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: upstream_cluster
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: upstream_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: upstream-1
                      port_value: 8080
              - endpoint:
                  address:
                    socket_address:
                      address: upstream-2
                      port_value: 8080
              - endpoint:
                  address:
                    socket_address:
                      address: upstream-3
                      port_value: 8080
              - endpoint:
                  address:
                    socket_address:
                      address: upstream-4
                      port_value: 8080
              - endpoint:
                  address:
                    socket_address:
                      address: upstream-5
                      port_value: 8080
